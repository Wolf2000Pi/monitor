<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0808081e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .login-container {
      background: #fff;
      padding: 2.5rem;
      border-radius: 12px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.3);
      width: 100%;
      max-width: 400px;
    }
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo img {
      max-width: 120px;
      height: auto;
    }
    h1 {
      text-align: center;
      color: #333;
      margin-bottom: 1.5rem;
      font-size: 1.5rem;
    }
    .error {
      background: #fee;
      color: #c00;
      padding: 0.75rem;
      border-radius: 6px;
      margin-bottom: 1rem;
      display: none;
      text-align: center;
    }
    .error.show { display: block; }
    input {
      width: 100%;
      padding: 0.875rem;
      margin-bottom: 1rem;
      border: 2px solid #eee;
      border-radius: 6px;
      font-size: 1rem;
      transition: border-color 0.2s;
    }
    input:focus {
      outline: none;
      border-color: #4a90d9;
    }
    button {
      width: 100%;
      padding: 0.875rem;
      background: #4a90d9;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #357abd; }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo">
      <img src="/assets/logo.png" alt="Logo" onerror="this.style.display='none'">
    </div>
    <h1>Anmelden</h1>
    <div class="error" id="error">Benutzername oder Passwort falsch</div>
    <form id="loginForm">
      <input type="text" id="username" name="username" placeholder="Benutzername" required autocomplete="username">
      <input type="password" id="password" name="password" placeholder="Passwort" required autocomplete="current-password">
      <button type="submit">Anmelden</button>
    </form>
  </div>
  <script>
    const form = document.getElementById('loginForm');
    const error = document.getElementById('error');
    
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;
      
      const credentials = btoa(username + ':' + password);
      
      try {
        const response = await fetch('/api/login', {
          method: 'POST',
          credentials: 'include',
          headers: {
            'Authorization': 'Basic ' + credentials
          }
        });
        
        if (response.ok) {
          const data = await response.json();
          if (data.success) {
            sessionStorage.setItem('auth', 'true');
            window.location.href = '/index.html';
          } else {
            error.classList.add('show');
          }
        } else {
          error.classList.add('show');
        }
      } catch (err) {
        error.classList.add('show');
      }
    });
  </script>
</body>
</html>
