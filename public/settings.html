<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Einstellungen - Service Monitor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1F1F1F;
      color: #eee;
      min-height: 100vh;
      padding: 20px;
    }
    .container { max-width: 800px; margin: 0 auto; }
    h1 { color: #00d9ff; margin-bottom: 20px; }
    h2 { color: #c1cbcd; margin: 20px 0 10px; }
    .card {
      background: #555555ab;
      border-radius: 12px;
      padding: 20px;
      margin-bottom: 15px;
    }
    label { display: block; margin-bottom: 5px; color: #aaa; }
    input[type="text"], input[type="number"], input[type="url"], select {
      width: 100%;
      padding: 10px;
      margin-bottom: 15px;
      border: 1px solid #444;
      border-radius: 6px;
      background: #333;
      color: #fff;
      font-size: 14px;
    }
    select { cursor: pointer; }
    .logo-select-wrapper { display: flex; gap: 10px; }
    .logo-select-wrapper select { flex: 1; }
    .logo-select-wrapper input { flex: 1; }
    .service-row {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-bottom: 10px;
      padding: 10px;
      background: #444;
      border-radius: 6px;
    }
    .service-row input { margin-bottom: 0; flex: 1; }
    .service-row input:first-child { max-width: 150px; }
    .service-row select { margin-bottom: 0; flex: 1; }
    .btn {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }
    .btn-primary { background: #00d9ff; color: #000; }
    .btn-danger { background: #ff4757; color: #fff; }
    .btn-success { background: #00ff88; color: #000; }
    .btn-add { background: #00d9ff; color: #000; }
    .btn-remove { padding: 10px 15px; }
    .nav { margin-bottom: 20px; }
    .nav a { color: #00d9ff; text-decoration: none; }
    .message {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      display: none;
    }
    .message.success { background: #00ff8822; color: #00ff88; display: block; }
    .message.error { background: #ff475722; color: #ff4757; display: block; }
  </style>
</head>
<body>
  <div class="container">
    <div class="nav">
      <a href="/">&larr; Zurück zum Monitor</a>
    </div>
    <h1>Einstellungen</h1>
    
    <div id="message" class="message"></div>
    
    <div class="card">
      <h2>Allgemein</h2>
      <label>Titel</label>
      <input type="text" id="title" placeholder="Mein Monitor">
      
      <label>Logo</label>
      <select id="logo"></select>
      
      <label>Refresh Interval (ms)</label>
      <input type="number" id="refreshInterval" value="30000">
      
      <label>Timeout (ms)</label>
      <input type="number" id="timeout" value="5000">
    </div>
    
    <div class="card">
      <h2>Services</h2>
      <div id="services"></div>
      <button class="btn btn-add" onclick="addService()">+ Service hinzufügen</button>
    </div>
    
    <button class="btn btn-success" onclick="saveConfig()">Speichern</button>
  </div>

  <script>
    let config = {};
    let images = [];
    
    async function loadImages() {
      try {
        const res = await fetch('/api/images');
        images = await res.json();
      } catch (e) {
        images = [];
      }
    }
    
    function createLogoSelect(selected = '') {
      let options = '<option value="">-- Kein Logo --</option>';
      images.forEach(img => {
        const selectedAttr = img === selected ? ' selected' : '';
        options += `<option value="${img}"${selectedAttr}>${img.split('/').pop()}</option>`;
      });
      return options;
    }
    
    async function loadConfig() {
      await loadImages();
      
      const res = await fetch('/api/config');
      config = await res.json();
      
      document.getElementById('title').value = config.title || '';
      document.getElementById('logo').innerHTML = createLogoSelect(config.logo);
      document.getElementById('refreshInterval').value = config.refreshInterval || 30000;
      document.getElementById('timeout').value = config.timeout || 5000;
      
      const servicesDiv = document.getElementById('services');
      servicesDiv.innerHTML = '';
      
      (config.services || []).forEach(service => {
        addService(service.name, service.url, service.logo);
      });
    }
    
    function addService(name = '', url = '', logo = '') {
      const div = document.createElement('div');
      div.className = 'service-row';
      div.innerHTML = `
        <input type="text" placeholder="Name" value="${name}">
        <input type="url" placeholder="URL" value="${url}">
        <select class="logo-select">${createLogoSelect(logo)}</select>
        <button class="btn btn-danger btn-remove" onclick="this.parentElement.remove()">✕</button>
      `;
      document.getElementById('services').appendChild(div);
    }
    
    async function saveConfig() {
      const rows = document.querySelectorAll('.service-row');
      const services = [];
      rows.forEach(row => {
        const inputs = row.querySelectorAll('input');
        const logoSelect = row.querySelector('.logo-select');
        if (inputs[1].value) {
          services.push({
            name: inputs[0].value,
            url: inputs[1].value,
            logo: logoSelect ? logoSelect.value : ''
          });
        }
      });
      
      const logoSelect = document.getElementById('logo');
      const newConfig = {
        title: document.getElementById('title').value,
        logo: logoSelect.value,
        refreshInterval: parseInt(document.getElementById('refreshInterval').value),
        timeout: parseInt(document.getElementById('timeout').value),
        services: services
      };
      
      try {
        const res = await fetch('/api/config', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(newConfig)
        });
        const result = await res.json();
        
        const msg = document.getElementById('message');
        if (result.success) {
          msg.className = 'message success';
          msg.textContent = 'Einstellungen gespeichert!';
        } else {
          msg.className = 'message error';
          msg.textContent = 'Fehler: ' + result.error;
        }
      } catch (e) {
        const msg = document.getElementById('message');
        msg.className = 'message error';
        msg.textContent = 'Fehler: ' + e.message;
      }
    }
    
    loadConfig();
  </script>
</body>
</html>
